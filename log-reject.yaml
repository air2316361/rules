proxies: []
proxy-groups:
  - name: 直连
    type: select
    proxies:
      - DIRECT
  - name: 拦截
    type: select
    proxies:
      - REJECT
rule-providers:
  banad:
    type: http
    behavior: classical
    format: text
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
    path: ./ruleset/banad.yaml
    interval: 86400
  banprogramad:
    type: http
    behavior: classical
    format: text
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
    path: ./ruleset/banprogramad.yaml
    interval: 86400
rules:
  - RULE-SET,banad,拦截
  - RULE-SET,banprogramad,拦截
  - DOMAIN,game-config.hypergryph.com,直连
  - DOMAIN,launcher.hypergryph.com,直连
  - DOMAIN,u8.hypergryph.com,直连
  - DOMAIN,beyond-cn.hypergryph.com,直连
  - DOMAIN-SUFFIX,hypergryph.com,拦截
  - DOMAIN-SUFFIX,gamesafe.qq.com,拦截
  - DOMAIN-SUFFIX,anticheatexpert.com,拦截
  - MATCH,直连