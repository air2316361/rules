proxies: []
proxy-groups:
  - name: 直连
    type: select
    proxies:
      - DIRECT
  - name: 拦截
    type: select
    proxies:
      - REJECT
rule-providers:
  banad:
    type: http
    behavior: classical
    format: text
    url: https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/BanAD.list
    path: ./ruleset/banad.yaml
    interval: 86400
  banprogramad:
    type: http
    behavior: classical
    format: text
    url: https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/BanProgramAD.list
    path: ./ruleset/banprogramad.yaml
    interval: 86400
  gameserver:
    type: http
    behavior: classical
    format: text
    url: https://cdn.jsdelivr.net/gh/air2316361/rules@master/My-Direct.txt
    path: ./ruleset/gameserver.yaml
    interval: 86400
  banlog:
    type: http
    behavior: classical
    format: text
    url: https://cdn.jsdelivr.net/gh/air2316361/rules@master/My-Reject.txt
    path: ./ruleset/banlog.yaml
    interval: 86400
rules:
  - RULE-SET,gameserver,直连
  - RULE-SET,banlog,拦截
  - RULE-SET,banad,拦截
  - RULE-SET,banprogramad,拦截
  - MATCH,直连
